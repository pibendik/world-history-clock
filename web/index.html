<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What Year Does It Look Like?</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Year Clock">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    /* Ensure the HTML `hidden` attribute always wins over any display: flex/block rules */
    [hidden] { display: none !important; }

    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --border: #30363d;
      --text-muted: #8b949e;
      --text-primary: #e6edf3;
      --accent: #39d0c8;
      --accent-dim: #1f6f6b;
      --year-color: #39d0c8;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      transition: background 0.6s ease;
    }

    body.future {
      --accent: #c678dd;
      --accent-dim: #5c2d6e;
      --year-color: #ff79c6;
      --border: #4a2460;
      --bg-card: #1a0d24;
    }

    .app-wrapper {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    .app-title {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
    }

    .clock-block {
      text-align: center;
    }

    .time-military {
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: clamp(4rem, 20vw, 7rem);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .time-military .seconds {
      font-size: 0.45em;
      color: var(--text-muted);
      vertical-align: middle;
    }

    .time-12hr {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
      font-variant-numeric: tabular-nums;
    }

    .year-card {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      text-align: center;
      box-shadow: var(--card-shadow);
      position: relative;
      overflow: hidden;
    }

    .year-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-dim) 0%, transparent 60%);
      opacity: 0.15;
      pointer-events: none;
    }

    .year-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }

    .year-number {
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: clamp(2.5rem, 14vw, 4.5rem);
      font-weight: 800;
      color: var(--year-color);
      line-height: 1;
      transition: color 0.4s ease;
    }

    .year-number.pulse {
      animation: yearPulse 0.6s ease-out;
    }

    @keyframes yearPulse {
      0%   { transform: scale(1.0); opacity: 1; }
      30%  { transform: scale(1.08); opacity: 0.7; }
      100% { transform: scale(1.0); opacity: 1; }
    }

    .year-era {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
      min-height: 1.1em;
    }

    .event-card {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      box-shadow: var(--card-shadow);
      min-height: 7rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      position: relative;
    }

    .event-card.antiquity {
      border-left-color: #d4a44c;
      background: linear-gradient(135deg, #1a1408 0%, var(--bg-card) 60%);
    }

    .event-card-header {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .event-text {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text-primary);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .event-text.visible { opacity: 1; }

    .event-source {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: auto;
    }

    .event-source a {
      color: var(--accent);
      text-decoration: none;
    }
    .event-source a:hover { text-decoration: underline; }

    .era-context {
      margin-top: 0.9rem;
      padding: 0.6rem 0.8rem;
      border-left: 3px solid var(--accent);
      font-size: 0.8rem;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.5;
      opacity: 0.85;
    }

    #eventText.era-context-mode {
      font-style: italic;
      opacity: 0.9;
    }

    .loading-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: dotBounce 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1.0); opacity: 1;   }
    }

    .footer {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-align: center;
      opacity: 0.5;
    }

    .topic-row {
      width: 100%;
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 0.25rem;
    }
    .topic-chip {
      flex-shrink: 0;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .topic-chip.active {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--text-primary);
    }
    .topic-chip.no-match {
      opacity: 0.4;
      border-style: dashed;
    }
    .topic-chip.no-match::after {
      content: '';
    }
    .topic-chip.has-match::after {
      content: ' •';
      color: var(--accent);
      font-size: 0.6rem;
    }

    .event-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .action-btn {
      padding: 0.3rem 0.7rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover { border-color: var(--accent); color: var(--text-primary); }
    .action-btn.active { border-color: var(--accent); background: var(--accent-dim); color: var(--text-primary); }
    .like-btn.reacted  { border-color: #3fb950; color: #3fb950; }
    .dislike-btn.reacted { border-color: #f85149; color: #f85149; }

    .saved-panel {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      overflow-y: auto;
    }
    .saved-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }
    .saved-panel-header button {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.2rem; cursor: pointer;
    }
    .saved-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
    }
    .saved-item-year { font-size: 0.7rem; color: var(--accent); margin-bottom: 0.3rem; }
    .saved-item-text { font-size: 0.9rem; color: var(--text-primary); line-height: 1.5; }
    .saved-item-remove { float: right; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.8rem; }

    .nav-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .nav-btn {
      padding: 0.3rem 0.8rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-btn:hover { border-color: var(--accent); color: var(--text-primary); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .nav-status {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
      flex: 1;
    }

    .era-badge {
      font-size: 0.65rem;
      color: var(--accent);
      margin-top: 0.4rem;
      letter-spacing: 0.05em;
      min-height: 1em;
      opacity: 0.8;
    }

    @media (min-width: 768px) {
      .app-wrapper { max-width: 600px; }
      .event-text { font-size: 1rem; }
    }

    .add-custom-chip {
      border-style: dashed;
      color: var(--accent);
      border-color: var(--accent-dim);
    }
    .add-custom-chip:hover { background: var(--accent-dim); }

    .chip-remove {
      margin-left: 0.3rem;
      opacity: 0.6;
      font-size: 0.65rem;
    }
    .chip-remove:hover { opacity: 1; }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .modal-title { font-weight: bold; color: var(--text-primary); }
    .modal-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      font-family: inherit;
      resize: vertical;
    }
    .modal-input:focus { outline: none; border-color: var(--accent); }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

    /* ── Clickable clock / inline time picker ─────────────────────────────── */
    #hhmm {
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #hhmm:hover { opacity: 0.75; }

    .time-input-inline {
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: clamp(4rem, 20vw, 7rem);
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.05em;
      line-height: 1;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--accent);
      outline: none;
      width: 6ch;
      text-align: center;
      /* hide the native spinner arrows */
      -webkit-appearance: none;
    }
    .time-input-inline::-webkit-calendar-picker-indicator { opacity: 0; }

    /* ── Back to Live button ──────────────────────────────────────────────── */
    .live-btn {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.55rem 1.1rem;
      min-height: 44px;
      border-radius: 999px;
      border: 1.5px solid #3fb950;
      background: rgba(63, 185, 80, 0.1);
      color: #3fb950;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
    }
    .live-btn:hover { background: rgba(63, 185, 80, 0.2); transform: scale(1.03); }
    .live-dot {
      animation: livePulse 1.4s ease-in-out infinite;
      font-size: 0.65em;
      line-height: 1;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── BROWSING badge ───────────────────────────────────────────────────── */
    .browsing-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      vertical-align: middle;
      margin-left: 0.4rem;
    }

    /* ── Timeline slider ──────────────────────────────────────────────────── */
    .timeline-bar {
      width: 100%;
      padding: 0.5rem 0 0.25rem;
      opacity: 0.45;
      transition: opacity 0.2s;
    }
    .timeline-bar:hover, .timeline-bar:focus-within { opacity: 1; }

    #timelineSlider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
      transition: height 0.15s;
    }
    .timeline-bar:hover #timelineSlider,
    .timeline-bar:focus-within #timelineSlider { height: 6px; }

    #timelineSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(57, 208, 200, 0.5);
      transition: transform 0.15s;
    }
    #timelineSlider::-webkit-slider-thumb:hover { transform: scale(1.3); }
    #timelineSlider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(57, 208, 200, 0.5);
    }

    .timeline-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 0.25rem;
      font-size: 0.6rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <p class="app-title">What Year Does It Look Like?</p>

    <div class="clock-block">
      <div class="time-military" id="timeMilitary">
        <span id="hhmm" title="Click to jump to a time">00:00</span><span class="seconds" id="ss">:00</span>
      </div>
      <div class="time-12hr" id="time12hr">12:00:00 AM</div>
    </div>

    <button id="liveBtn" class="live-btn" aria-label="Return to live clock" hidden>
      <span class="live-dot">●</span> Back to Live
    </button>

    <div class="year-card">
      <div class="year-label">Current Year</div>
      <div class="year-number" id="yearNumber">0000</div>
      <div class="year-era" id="yearEra"></div>
      <div class="era-badge" id="eraBadge"></div>
    </div>

    <div class="nav-row" id="navRow">
      <button class="nav-btn" id="prevBtn">‹ Prev</button>
      <span class="nav-status" id="navStatus"></span>
      <button class="nav-btn" id="nextBtn">Next ›</button>
    </div>

    <div class="event-card" id="eventCard">
      <div class="event-card-header" id="eventHeader">Historical Event</div>
      <div class="event-text" id="eventText">
        <span class="loading-dots"><span></span><span></span><span></span></span>
      </div>
      <div class="event-source" id="eventSource"></div>
      <div class="era-context" id="eraContext" hidden></div>
      <div class="event-actions">
        <button class="action-btn save-btn" id="saveBtn" title="Save this fact">★ Save</button>
        <button class="action-btn like-btn" id="likeBtn" title="Like this fact">👍</button>
        <button class="action-btn dislike-btn" id="dislikeBtn" title="Dislike — don't show again">👎</button>
        <button class="action-btn saved-list-btn" id="savedListBtn" title="View saved facts">📋 Saved (<span id="savedCount">0</span>)</button>
      </div>
    </div>

    <div class="topic-row" id="topicRow"></div>

    <div class="timeline-bar" id="timelineBar">
      <input type="range" id="timelineSlider" min="0" max="1439" value="0"
             aria-label="Navigate through the day">
      <div class="timeline-labels">
        <span>00:00</span>
        <span>06:00</span>
        <span>12:00</span>
        <span>18:00</span>
        <span>23:59</span>
      </div>
    </div>

    <p class="footer">Clock updates every second &bull; Events refresh each minute &bull; <a href="#" id="eraStatsLink" style="color:var(--accent)">📊 Era stats</a></p>
  </div>

  <div class="saved-panel" id="savedPanel" hidden>
    <div class="saved-panel-header">
      <span>★ Saved Facts</span>
      <button id="closeSavedPanel">✕</button>
    </div>
    <div class="saved-list" id="savedList"></div>
  </div>

  <div class="saved-panel era-stats-panel" id="eraStatsPanel" hidden>
    <div class="saved-panel-header">
      <span>📊 Era Exposure</span>
      <button id="closeEraStats">✕</button>
    </div>
    <div id="eraStatsList"></div>
  </div>

  <div class="modal-overlay" id="customTopicModal" hidden>
    <div class="modal-box">
      <div class="modal-title">Add Custom Topic</div>
      <input class="modal-input" id="customTopicName" placeholder="Topic name (e.g. Chess)" maxlength="30" />
      <textarea class="modal-input" id="customTopicKeywords" placeholder="Keywords, comma-separated (e.g. chess, tournament, grandmaster)" rows="3"></textarea>
      <div class="modal-actions">
        <button class="action-btn" id="saveCustomTopic">Add Topic</button>
        <button class="action-btn" id="cancelCustomTopic">Cancel</button>
      </div>
    </div>
  </div>

  <script>

    const CURRENT_YEAR = new Date().getFullYear();
    // In production, API is on the same origin (Caddy proxies /api/*).
    // In dev (localhost), fall back to the local API port.
    const API_BASE = window.location.hostname === 'localhost'
      ? 'http://localhost:8421'
      : window.location.origin;
    const API_URL = (window.YEARCLOCK_API_BASE || API_BASE) + '/api/v1';

    function sanitise(str) {
      const d = document.createElement('div');
      d.textContent = String(str ?? '');
      return d.innerHTML;
    }

    const EPOCHS = [{"name":"Bronze Age","start":-3300,"end":-1200,"description":"The Bronze Age marked the widespread use of bronze for tools and weapons, enabling the rise of early civilizations. Major cultures emerged in Mesopotamia, Egypt, the Aegean, and beyond.","category":"general","weight":4},{"name":"Ancient Egypt","start":-3100,"end":-30,"description":"One of the world's earliest and longest-lasting civilizations, ancient Egypt flourished along the Nile for over three millennia. It produced iconic monuments, hieroglyphic writing, and a complex polytheistic religion.","category":"general","weight":6},{"name":"Iron Age","start":-1200,"end":500,"description":"The Iron Age saw iron replace bronze as the dominant material for tools and weapons, transforming agriculture and warfare. It witnessed the rise of many of the great civilizations of antiquity.","category":"general","weight":4},{"name":"Ancient Greece","start":-800,"end":-146,"description":"Ancient Greece was the birthplace of democracy, philosophy, and much of Western cultural tradition. City-states like Athens and Sparta shaped art, science, and political thought for millennia to come.","category":"general","weight":6},{"name":"Classical Antiquity","start":-800,"end":600,"description":"Classical Antiquity spans the great civilizations of Greece and Rome, whose cultural, philosophical, and political legacies defined Western civilization. This era produced foundational works in literature, science, architecture, and governance.","category":"general","weight":7},{"name":"Roman Republic","start":-509,"end":-27,"description":"The Roman Republic developed a sophisticated system of republican governance, law, and military organization that allowed Rome to dominate the Mediterranean world. Its political institutions and legal codes have profoundly influenced modern governance.","category":"political","weight":6},{"name":"Roman Empire","start":-27,"end":476,"description":"At its height the Roman Empire encompassed most of Europe, North Africa, and the Near East, uniting diverse peoples under a single administration. Its engineering, law, language, and culture form the bedrock of Western civilization.","category":"general","weight":8},{"name":"Late Antiquity","start":300,"end":600,"description":"Late Antiquity was a transitional period between the classical world and the medieval era, marked by the Christianization of the Roman Empire and the great migrations of Germanic peoples. It saw the fall of the Western Roman Empire and the emergence of new European kingdoms.","category":"general","weight":4},{"name":"Byzantine Empire","start":330,"end":1453,"description":"The Byzantine Empire was the continuation of the Eastern Roman Empire, preserving Greek and Roman culture, law, and Christianity through the medieval period. Its capital Constantinople was the largest and wealthiest city in Christendom for much of this era.","category":"general","weight":6},{"name":"Early Middle Ages","start":500,"end":1000,"description":"The Early Middle Ages saw Europe reorganize following the collapse of the Western Roman Empire, with feudal kingdoms, the spread of Christianity, and monastic scholarship emerging. Trade declined but new cultural and religious identities took shape.","category":"general","weight":5},{"name":"Medieval music","start":500,"end":1400,"description":"Medieval music encompasses sacred chant, polyphony, and the secular songs of troubadours and trouv\u00e8res. Gregorian chant and the earliest forms of written musical notation emerged during this era.","category":"music","weight":4},{"name":"Islamic Golden Age","start":750,"end":1258,"description":"The Islamic Golden Age was a period of remarkable intellectual and cultural flourishing in the Islamic world, with major advances in mathematics, astronomy, medicine, and philosophy. Scholars preserved and expanded upon Greek knowledge while making original contributions that shaped the Renaissance.","category":"science","weight":7},{"name":"Viking Age","start":793,"end":1066,"description":"The Viking Age was defined by Norse seafarers who explored, traded, and raided across Europe, the North Atlantic, and beyond. Their longships carried them from North America to Constantinople, leaving a lasting cultural and genetic legacy.","category":"general","weight":7},{"name":"High Middle Ages","start":1000,"end":1300,"description":"The High Middle Ages saw population growth, the rise of cities and universities, and the flourishing of Gothic architecture and scholastic philosophy in Europe. Feudal society reached its peak alongside the growth of merchant trade and the emergence of national identities.","category":"general","weight":6},{"name":"Crusades","start":1095,"end":1291,"description":"The Crusades were a series of religious military campaigns launched by Christian Europe to capture the Holy Land from Muslim rule. They reshaped politics, trade, and cultural exchange between East and West.","category":"religious","weight":6},{"name":"Late Middle Ages","start":1300,"end":1500,"description":"The Late Middle Ages were marked by crisis and transformation: the Black Death, the Hundred Years' War, and the Western Schism challenged medieval institutions. Yet this period also laid the groundwork for the Renaissance and the modern era.","category":"general","weight":5},{"name":"Renaissance","start":1300,"end":1600,"description":"The Renaissance was a sweeping cultural and intellectual revival centered on the rediscovery of classical antiquity, producing masterworks of painting, sculpture, architecture, and literature. It transformed European thought, elevating humanism and empirical inquiry.","category":"art","weight":8},{"name":"Renaissance music","start":1400,"end":1600,"description":"Renaissance music was characterized by greater use of polyphony, secular forms like the madrigal, and the beginnings of tonal harmony. Composers such as Palestrina, Josquin des Prez, and Byrd defined the era's rich choral tradition.","category":"music","weight":5},{"name":"Age of Exploration","start":1400,"end":1700,"description":"The Age of Exploration was driven by European navigators seeking new trade routes, leading to the mapping of the globe and the establishment of overseas empires. It transformed global commerce and culture while also initiating devastating colonization of the Americas and Africa.","category":"exploration","weight":7},{"name":"Reformation","start":1517,"end":1648,"description":"The Reformation began with Martin Luther's challenge to Catholic Church authority and splintered Western Christianity into Catholic and Protestant branches. It unleashed a century of religious conflict while also stimulating literacy, vernacular culture, and new ideas about individual conscience.","category":"religious","weight":6},{"name":"Age of Sail","start":1571,"end":1862,"description":"The Age of Sail saw wind-powered wooden warships and merchant vessels dominate global trade and warfare. Naval power determined empire, and the mastery of sail enabled the world's first truly global economy.","category":"exploration","weight":5},{"name":"Scientific Revolution","start":1543,"end":1687,"description":"The Scientific Revolution overturned ancient authorities with empirical observation and mathematical reasoning, producing breakthroughs by Copernicus, Galileo, Kepler, and Newton. It established the foundations of modern science and transformed humanity's understanding of the natural world.","category":"science","weight":8},{"name":"Baroque era","start":1600,"end":1750,"description":"The Baroque era produced some of the most dramatic and emotionally expressive music in the Western canon, from the operas of Monteverdi to the masterworks of Bach and Handel. Characterized by ornate complexity and grandeur, it shaped the foundations of classical harmony and counterpoint.","category":"music","weight":6},{"name":"Age of Enlightenment","start":1685,"end":1815,"description":"The Age of Enlightenment championed reason, individual rights, and skepticism toward traditional authority, inspiring revolutions in America and France. Philosophers like Locke, Voltaire, Rousseau, and Kant reshaped political philosophy, science, and society.","category":"general","weight":8},{"name":"Industrial Revolution","start":1760,"end":1840,"description":"The Industrial Revolution transformed manufacturing from hand production to machine-based factory work, first in Britain then across the world. It unleashed unprecedented economic growth, urbanization, and social upheaval, reshaping nearly every aspect of daily life.","category":"general","weight":8},{"name":"Classical music era","start":1750,"end":1820,"description":"The Classical music era produced balanced, elegant forms in symphony, sonata, and opera, epitomized by Haydn, Mozart, and the early Beethoven. It established the orchestra as the central vehicle of Western art music and developed the formal structures that still define concert music.","category":"music","weight":6},{"name":"Classical period music","start":1750,"end":1820,"description":"The Classical period in music is defined by clarity of form, balanced phrase structure, and the dominance of homophonic texture over Baroque counterpoint. The symphonies, string quartets, and piano sonatas of this era set the standard for Western art music.","category":"music","weight":6},{"name":"Romantic era","start":1820,"end":1900,"description":"The Romantic era in music emphasized personal expression, nationalism, and emotional intensity, expanding the orchestra and developing new forms like the symphonic poem. Composers such as Beethoven, Schubert, Brahms, Wagner, and Tchaikovsky defined its sweeping ambition.","category":"music","weight":7},{"name":"Romantic period music","start":1820,"end":1910,"description":"Romantic period music pushed harmonic language to its limits and elevated the virtuoso performer, producing beloved works by Chopin, Liszt, Brahms, and Mahler. The era saw the birth of national schools and the symphony orchestra in its modern form.","category":"music","weight":7},{"name":"Victorian Era","start":1837,"end":1901,"description":"The Victorian Era under Queen Victoria saw Britain at the height of its imperial power, with rapid industrialization, technological innovation, and strict social mores defining the age. It was a period of great literary and scientific achievement alongside stark social inequality.","category":"general","weight":8},{"name":"Age of Imperialism","start":1800,"end":1914,"description":"The Age of Imperialism saw European powers carve up Africa, Asia, and the Pacific into colonial empires, extracting resources and imposing foreign rule on hundreds of millions of people. Competing imperial ambitions ultimately contributed to the outbreak of the First World War.","category":"political","weight":6},{"name":"Modern classical","start":1890,"end":1970,"description":"Modern classical music broke free of tonal harmony and romantic convention, with Debussy, Schoenberg, Stravinsky, and Bart\u00f3k pioneering new languages from impressionism to atonalism and serialism. It remains one of the most intellectually adventurous periods in music history.","category":"music","weight":5},{"name":"Belle \u00c9poque","start":1880,"end":1914,"description":"The Belle \u00c9poque ('Beautiful Era') was a period of optimism, artistic flourishing, and technological progress in Europe before World War I shattered the peace. Paris was its cultural capital, hosting the Impressionists, Art Nouveau, and the birth of cinema.","category":"art","weight":6},{"name":"World War I era","start":1914,"end":1918,"description":"World War I was the first truly industrialized global conflict, claiming the lives of over 17 million people and redrawing the map of Europe and the Middle East. It ended four empires and unleashed forces of nationalism, revolution, and disillusionment that shaped the entire 20th century.","category":"general","weight":7},{"name":"Jazz Age","start":1920,"end":1940,"description":"The Jazz Age saw African American musical genius transform popular culture, with jazz spreading from New Orleans to cities worldwide and becoming the defining sound of the Roaring Twenties. It was an era of cultural vitality, the Harlem Renaissance, and the first great flowering of recorded music.","category":"music","weight":6},{"name":"Interwar period","start":1918,"end":1939,"description":"The Interwar period was marked by political instability, the Great Depression, the rise of fascism and communism, and rapid cultural change. It was an anxious era poised between the trauma of one world war and the gathering storm of another.","category":"general","weight":6},{"name":"Great Depression","start":1929,"end":1939,"description":"The Great Depression was the most severe global economic downturn of the 20th century, causing mass unemployment, poverty, and political radicalization worldwide. It fundamentally changed the relationship between governments and economies and paved the way for the welfare state.","category":"general","weight":5},{"name":"World War II era","start":1939,"end":1945,"description":"World War II was the deadliest conflict in human history, with over 70 million casualties including the Holocaust's six million Jewish victims. It ended with the dawn of the nuclear age and reshaped the global order around two superpowers, the US and USSR.","category":"general","weight":8},{"name":"Cold War","start":1947,"end":1991,"description":"The Cold War was a decades-long ideological, political, and military standoff between the United States and the Soviet Union that shaped global politics and culture. It produced the nuclear arms race, proxy wars, the space race, and ultimately ended with the dissolution of the USSR.","category":"political","weight":8},{"name":"Rock and Roll era","start":1950,"end":1970,"description":"Rock and Roll emerged from African American rhythm and blues to become the defining sound of youth rebellion worldwide, fueled by Elvis, Chuck Berry, The Beatles, and the Rolling Stones. It transformed popular culture, fashion, and attitudes across the globe.","category":"music","weight":6},{"name":"Space Age","start":1957,"end":9999,"description":"The Space Age began with Sputnik's launch in 1957 and saw humans land on the Moon, deploy space stations, and send probes throughout the solar system. It represents humanity's first steps beyond Earth and continues to define scientific ambition and technological possibility.","category":"science","weight":7},{"name":"Digital Age","start":1970,"end":9999,"description":"The Digital Age has transformed human society through the proliferation of computers, the internet, and mobile technology, connecting billions of people and reshaping every aspect of commerce, communication, and culture. It continues to accelerate with artificial intelligence, cloud computing, and ubiquitous connectivity.","category":"science","weight":8},{"name":"Postwar boom","start":1945,"end":1973,"description":"The Postwar boom was an era of unprecedented economic growth, suburbanization, and consumer culture across the Western world following World War II. Rising living standards, the baby boom, and the expansion of the middle class defined this optimistic period.","category":"general","weight":5},{"name":"Age of Revolution","start":1775,"end":1848,"description":"The Age of Revolution saw political upheaval sweep the Atlantic world, from the American and French Revolutions to the independence movements of Latin America and the liberal revolts of 1848. It permanently transformed ideas about popular sovereignty, citizenship, and human rights.","category":"political","weight":7},{"name":"Gilded Age","start":1870,"end":1900,"description":"The Gilded Age in America was a period of rapid industrialization, massive wealth inequality, and the rise of industrial capitalism dominated by robber barons like Carnegie and Rockefeller. Beneath its glittering surface lay labor exploitation, political corruption, and social upheaval.","category":"general","weight":5},{"name":"Information Age","start":1990,"end":9999,"description":"The Information Age is characterized by the rapid shift from industrial to information-based economies driven by the internet, smartphones, and global digital networks. It has democratized access to knowledge while raising new questions about privacy, misinformation, and economic disruption.","category":"science","weight":7},{"name":"Progressive Era","start":1896,"end":1917,"description":"The Progressive Era in the United States brought widespread social and political reform in response to industrialization, including women's suffrage, labor rights, antitrust legislation, and urban sanitation. It marked the emergence of the modern regulatory state.","category":"political","weight":4},{"name":"Atomic Age","start":1945,"end":1991,"description":"The Atomic Age began with the use of nuclear weapons in 1945 and was defined by the existential threat of nuclear war and the promise\u2014and peril\u2014of nuclear power. It shaped international relations, civil defense culture, and environmental awareness throughout the Cold War.","category":"science","weight":6},{"name":"Pop Art era","start":1955,"end":1975,"description":"The Pop Art era challenged fine art conventions by embracing imagery from mass culture, advertising, and consumer goods, with artists like Warhol, Lichtenstein, and Hockney leading the movement. It blurred the line between high and low culture and remains one of the most recognizable art movements of the 20th century.","category":"art","weight":4},{"name":"Ancient Near East","start":-3500,"end":-500,"description":"The Ancient Near East was the cradle of civilization, where Sumerians, Akkadians, Babylonians, and Assyrians built the world's first cities, writing systems, and legal codes. From the Tigris\u2013Euphrates valley came agriculture, the wheel, and the foundations of Western religion and law.","category":"general","weight":6},{"name":"Ming Dynasty","start":1368,"end":1644,"description":"The Ming Dynasty was one of the most stable and prosperous periods in Chinese history, producing iconic blue-and-white porcelain, constructing the Great Wall in its familiar form, and sponsoring Zheng He's great maritime expeditions. Its arts, philosophy, and administrative culture profoundly shaped East Asia.","category":"general","weight":5}];

    function getErasForYear(year) {
      return EPOCHS
        .filter(e => year >= e.start && year <= e.end)
        .sort((a, b) => b.weight - a.weight);
    }

    function formatEraDisplay(year) {
      const eras = getErasForYear(year);
      if (!eras.length) return '';
      return eras.slice(0, 2).map(e => e.name).join(' / ');
    }

    function getEraFallbackText(year) {
      const eras = getErasForYear(year);
      if (!eras.length) return `No specific records found for year ${year}`;
      const top = eras[0];
      return top.description + ` (Year ${year} falls within: ${eras.slice(0,2).map(e=>e.name).join(', ')})`;
    }

    // ── Era exposure tracker ──────────────────────────────────────────────────
    function loadEraExposure() {
      try { return JSON.parse(localStorage.getItem('clockapp-era-exposure') || '{}'); }
      catch { return {}; }
    }
    function saveEraExposure(exp) {
      localStorage.setItem('clockapp-era-exposure', JSON.stringify(exp));
    }
    function incrementEraExposure(eraName) {
      const exp = loadEraExposure();
      exp[eraName] = (exp[eraName] || 0) + 1;
      saveEraExposure(exp);
    }
    function getEraExposureScore(era) {
      // Lower score = more underrepresented = higher priority to show
      const exp = loadEraExposure();
      const count = exp[era.name] || 0;
      // Normalize by weight: divide count by weight so high-weight eras need more shows to be "satisfied"
      return count / era.weight;
    }
    function pickBestEra(year) {
      const eras = getErasForYear(year);
      if (!eras.length) return null;
      // Sort by exposure score ascending (most underrepresented first)
      const sorted = [...eras].sort((a, b) => getEraExposureScore(a) - getEraExposureScore(b));
      return sorted[0];
    }

    class YearCache {
      constructor() {
        this._cache = new Map(); // year -> { events: [], index: 0, source: '' }
        this._topicIndex = new Map(); // `${year}:${topic}` -> index
        this._context = new Map(); // year -> context sentence string
        this._tried = new Set(); // years we've fetched from API (even if no events returned)
      }

      store(year, events, source) {
        if (!this._cache.has(year)) {
          this._cache.set(year, { events, source, index: 0 });
        }
        // Don't overwrite existing cache (preserve cycling position)
      }

      storeContext(year, text) {
        if (text) this._context.set(year, text);
      }

      getContext(year) { return this._context.get(year) || null; }

      markTried(year) { this._tried.add(year); }
      hasTried(year) { return this._tried.has(year); }

      getNext(year) {
        const entry = this._cache.get(year);
        if (!entry || entry.events.length === 0) return null;
        const event = entry.events[entry.index % entry.events.length];
        entry.index++;
        return { event, source: entry.source, total: entry.events.length, shown: entry.index };
      }

      // Cycles through events matching topic keywords; falls back to all events if none match.
      getNextForTopic(year, topic, keywords) {
        const entry = this._cache.get(year);
        if (!entry || entry.events.length === 0) return null;
        const filtered = keywords
          ? entry.events.filter(e => keywords.some(kw => e.toLowerCase().includes(kw)))
          : entry.events;
        const pool = filtered.length > 0 ? filtered : entry.events;
        const isFallback = filtered.length === 0 && !!keywords;
        const key = `${year}:${topic}`;
        const idx = (this._topicIndex.get(key) || 0) % pool.length;
        const event = pool[idx];
        this._topicIndex.set(key, idx + 1);
        return { event, source: entry.source, total: pool.length, shown: idx + 1, fallback: isFallback };
      }

      has(year) { return this._cache.has(year) && this._cache.get(year).events.length > 0; }
    }

    const yearCache = new YearCache();

    class EventBuffer {
      constructor() {
        this._store = new Map(); // year -> { text, source, url, fetching, error }
      }
      set(year, data) { this._store.set(year, { ...data, fetching: false, error: false }); }
      setFetching(year) { this._store.set(year, { fetching: true, error: false }); }
      get(year) { return this._store.get(year) || null; }
      has(year) {
        const e = this._store.get(year);
        return e && !e.fetching;
      }
      prefetch(currentYear, fetchFn) {
        const targets = [currentYear - 2, currentYear - 1, currentYear + 1, currentYear + 2]
          .filter(y => y >= 0 && y <= 2359);
        for (const y of targets) {
          if (!this._store.has(y)) {
            this.setFetching(y);
            fetchFn(y).then(result => {
              if (result) this.set(y, result);
              else this._store.delete(y);
            }).catch(() => this._store.delete(y));
          }
        }
      }
    }

    function getYearFromTime(hh, mm) {
      return parseInt(String(hh).padStart(2, '0') + String(mm).padStart(2, '0'));
    }

    function eraLabel(year) {
      if (year > CURRENT_YEAR) return 'The Future';
      const epochStr = formatEraDisplay(year);
      if (epochStr) return epochStr;
      // fallbacks for edge cases
      if (year === 0)  return 'Year Zero / 1 BC';
      if (year < 0)    return 'BC';
      if (year < 500)  return 'Late Antiquity';
      if (year < 1000) return 'Early Medieval';
      return 'Historical';
    }

    function applyYearStyle(year) {
      const isFuture   = year > CURRENT_YEAR;
      const isAntiquity = year < 100;
      document.body.classList.toggle('future', isFuture);
      elCard.classList.toggle('antiquity', isAntiquity && !isFuture);

      if (isFuture) {
        elHeader.textContent = 'THE FUTURE';
      } else if (isAntiquity) {
        elHeader.textContent = 'Antiquity Event';
      } else {
        elHeader.textContent = 'Historical Event';
      }
    }

    function pulseYear() {
      elYear.classList.remove('pulse');
      void elYear.offsetWidth; // reflow
      elYear.classList.add('pulse');
      elYear.addEventListener('animationend', () => elYear.classList.remove('pulse'), { once: true });
    }

    function showLoading() {
      elEvent.classList.remove('visible');
      elEvent.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
      elSource.innerHTML = '';
      elEraCtx.hidden = true;
      elEraCtx.textContent = '';

    function showEvent(lines, source, sourceUrl, counter = '', displayYear = lastYear) {
      elEvent.classList.remove('visible');
      elEvent.textContent = lines;
      currentEventText = lines;
      currentSource = source || null;

      const isEraContext = source === 'Era context';

      if (isEraContext) {
        elEvent.classList.add('era-context-mode');
        elSource.innerHTML = '';
        elEraCtx.hidden = true;
        elEraCtx.textContent = '';
        // Update header to reflect era mode
        if (elHeader.textContent !== 'THE FUTURE') {
          elHeader.textContent = elCard.classList.contains('antiquity') ? 'Antiquity Era' : 'Historical Era';
        }
      } else {
        elEvent.classList.remove('era-context-mode');
        const srcHtml = source
          ? `Source: <a href="${sanitise(sourceUrl || '#')}" target="_blank" rel="noopener">${sanitise(source)}</a>`
          : '';
        const counterHtml = counter ? ` <span style="opacity:0.5;font-size:0.85em">(${sanitise(counter)})</span>` : '';
        elSource.innerHTML = srcHtml + counterHtml;

        // Show era context sentence for the year being displayed
        const ctx = yearCache.getContext(displayYear);
        if (ctx) {
          elEraCtx.textContent = ctx;
          elEraCtx.hidden = false;
        } else {
          elEraCtx.hidden = true;
          elEraCtx.textContent = '';
        }
      }

      requestAnimationFrame(() => {
        requestAnimationFrame(() => elEvent.classList.add('visible'));
      });
      updateReactionButtons(lastYear, lines);
    }

    async function fetchWikidataDirect(year) {
      // Must match the server-side _is_interesting_label() logic in fetcher.py
      const Q_CODE = /^Q\d+$/;
      const BORING_PATTERNS = [
        /^.+ at the \d{4} (Summer|Winter) Olympics?$/i,
        /^.+ at the \d{4} (Summer|Winter) Paralympic Games?$/i,
        /^.+ at the \d{4} (Summer|Winter) Youth Olympics?$/i,
        /^.+ at the \d{4} Commonwealth Games?$/i,
        /^.+ at the \d{4} (FIFA|UEFA|FIBA|IAAF|UCI|IIHF)/i,
        /^\d{4}[-–]\d{2,4} .*(season|league|championship|cup)$/i,
        /^(January|February|March|April|May|June|July|August|September|October|November|December) \d{4}$/i,
        /^\d{4} in /i,
        /one-year-period/i,
        /^\d{3,4}[-–]\d{2,4}$/,
        // Astronomical events
        /^(Solar|Lunar) eclipse of /i,
        /^Transit of (Mercury|Venus|Mars)/i,
        /^Occultation of /i,
        /^(Annular|Total|Partial|Hybrid) (solar|lunar) eclipse/i,
        // Astronomical catalog objects
        /^NGC \d+/i,
        /^IC \d+$/i,
        /^(Messier|M) \d+$/i,
        /^\(\d{2,}\) \w/,
        /\bmain.belt asteroid\b/i,
        /\bnear.Earth (asteroid|object)\b/i,
        /\bSocket \d+\b/i,
        /^Category:/i,
        /^SCP-\d+/i,
        /reserved for private use/i,
        /^\d+$/,
      ];
      const isInteresting = (label) => {
        if (!label) return false;
        if (Q_CODE.test(label)) return false;
        if (!label.includes(' ')) return false;
        if (label.trim().length < 20) return false;
        return !BORING_PATTERNS.some(p => p.test(label));
      };

      const P31_EXCL = [
        'FILTER NOT EXISTS { ?event wdt:P31 wd:Q13406463. }',
        'FILTER NOT EXISTS { ?event wdt:P31 wd:Q14204246. }',
        'FILTER NOT EXISTS { ?event wdt:P31 wd:Q21199. }',
        'FILTER NOT EXISTS { ?event wdt:P31 wd:Q4167836. }',
        'FILTER NOT EXISTS { ?event wdt:P31 wd:Q17633526. }',
        'FILTER NOT EXISTS { ?event wdt:P31 wd:Q3863. }',
        'FILTER NOT EXISTS { ?event wdt:P31 wd:Q61788250. }',
        'FILTER NOT EXISTS { ?event wdt:P31 wd:Q188025. }',    // solar eclipse
        'FILTER NOT EXISTS { ?event wdt:P31 wd:Q3234690. }',   // lunar eclipse
        'FILTER NOT EXISTS { ?event wdt:P31 wd:Q645883. }',    // occultation
        'FILTER NOT EXISTS { ?event wdt:P31 wd:Q107024. }',    // meteor shower
        'FILTER NOT EXISTS { ?event wdt:P31 wd:Q1151284. }',   // transit of a planet
        'FILTER NOT EXISTS { ?event wdt:P31 wd:Q523. }',       // star
        'FILTER NOT EXISTS { ?event wdt:P31 wd:Q318. }',       // galaxy
      ].join('\n  ');

      const runQuery = async (sparql) => {
        const url = `https://query.wikidata.org/sparql?format=json&query=${encodeURIComponent(sparql)}`;
        const resp = await fetch(url, { headers: { Accept: 'application/sparql-results+json' } });
        if (!resp.ok) return [];
        const data = await resp.json();
        return data.results.bindings
          .map(b => b.eventLabel?.value)
          .filter(isInteresting);
      };

      const q1 = `SELECT DISTINCT ?eventLabel WHERE {
  ?event wdt:P585 ?date.
  FILTER(YEAR(?date) = ${year})
  ${P31_EXCL}
  SERVICE wikibase:label { bd:serviceParam wikibase:language "en". }
} LIMIT 20`;

      const q2 = `SELECT DISTINCT ?eventLabel WHERE {
  ?event wdt:P571 ?date.
  FILTER(YEAR(?date) = ${year})
  ${P31_EXCL}
  SERVICE wikibase:label { bd:serviceParam wikibase:language "en". }
} LIMIT 15`;

      const [labels1, labels2] = await Promise.all([runQuery(q1), runQuery(q2)]);
      const seen = new Set();
      const combined = [];
      for (const label of [...labels1, ...labels2]) {
        if (!seen.has(label)) { seen.add(label); combined.push(label); }
      }
      if (combined.length === 0) throw new Error('No results');
      yearCache.store(year, combined, 'Wikidata');
      return combined;
    }

    // Proxy: tries the FastAPI backend first, falls back to direct Wikidata only if
    // the backend is completely unreachable (not just returning empty results).
    async function fetchWikidata(year) {
      try {
        const resp = await fetch(`${API_URL}/year/${year}`, { signal: AbortSignal.timeout(30000) });
        if (resp.ok) {
          const data = await resp.json();
          const events = (data.events || []).map(e => e.text || e).filter(Boolean);
          if (data.context) yearCache.storeContext(year, data.context);
          if (events.length > 0) {
            yearCache.store(year, events, 'API');
          }
          // API responded — trust it even if empty. Don't fall through to direct
          // Wikidata: that causes 429 rate limiting from multiple browser tabs.
          return events;
        }
      } catch (_) {
        // Backend unreachable or timed out — fall through to direct Wikidata below
      }
      return await fetchWikidataDirect(year);
    }

    // Pure async function — fetches event data for a year without touching the DOM.
    // Uses yearCache for raw labels, applies topic/dislike filters, returns {text, source, url}.
    async function fetchEventData(year) {
      if (year > CURRENT_YEAR) {
        const futureEra = formatEraDisplay(year);
        return {
          text: futureEra
            ? `Year ${year} hasn't happened yet. Era context: ${futureEra}`
            : `Year ${year} hasn't happened yet.`,
          source: null, url: null
        };
      }
      try {
        if (!yearCache.has(year) && !yearCache.hasTried(year)) {
          const labels = await fetchWikidata(year);
          yearCache.markTried(year); // remember we tried, even if no results
          allLabels = labels;
        } else if (yearCache.has(year) && allLabels.length === 0) {
          allLabels = yearCache._cache.get(year)?.events || [];
        }
        if (yearCache.has(year)) {
          const keywords = getActiveKeywords();
          const wikiUrl = `https://www.wikidata.org/wiki/Special:Search?search=${year}`;
          const total = yearCache._cache.get(year)?.events.length || 1;
          for (let attempt = 0; attempt < total; attempt++) {
            const next = yearCache.getNextForTopic(year, activeTopic, keywords);
            if (!next) break;
            if (!isDisliked(year, next.event)) {
              const { event, fallback } = next;
              const text = event + (fallback ? ` (no ${activeTopic} events found for this year — showing any)` : '');
              return { text, source: 'Wikidata', url: wikiUrl };
            }
          }
        }
      } catch (_) {}
      const eraCtx = yearCache.getContext(year);
      if (eraCtx) {
        return { text: eraCtx, source: 'Era context', url: null };
      }
      return { text: getEraFallbackText(year), source: null, url: null };
    }

    async function fetchEvent(year) {
      if (eventBuffer.has(year)) {
        const cached = eventBuffer.get(year);
        showEvent(cached.text, cached.source, cached.url, '', year);
        if (yearCache.has(year)) {
          allLabels = yearCache._cache.get(year)?.events || [];
          renderTopicChips(classifyTopics(allLabels));
        }
        eventBuffer.prefetch(year, fetchEventData);
        return;
      }

      showLoading();
      const result = await fetchEventData(year);
      if (result) {
        eventBuffer.set(year, result);
        showEvent(result.text, result.source, result.url, '', year);
        renderTopicChips(classifyTopics(allLabels));
      } else {
        showEvent(getEraFallbackText(year), null, null, '', year);
      }
      eventBuffer.prefetch(year, fetchEventData);
    }

    function tick() {
      const now = new Date();
      const hh  = now.getHours();
      const mm  = now.getMinutes();
      const ss  = now.getSeconds();

      const hhStr = String(hh).padStart(2, '0');
      const mmStr = String(mm).padStart(2, '0');
      const ssStr = String(ss).padStart(2, '0');

      elHHMM.textContent = `${hhStr}:${mmStr}`;
      elSS.textContent   = `:${ssStr}`;

      // Keep slider in sync with live clock
      if (viewingYear === null) {
        const slider = document.getElementById('timelineSlider');
        if (slider) slider.value = hh * 60 + mm;
      }

      const hour12  = hh % 12 || 12;
      const ampm    = hh < 12 ? 'AM' : 'PM';
      el12hr.textContent = `${String(hour12).padStart(2, '0')}:${mmStr}:${ssStr} ${ampm}`;

      // Update browser tab
      document.title = `${hhStr}:${mmStr} — What Year Does It Look Like?`;

      const year = getYearFromTime(hh, mm);

      if (year !== lastYear) {
        lastYear = year;

        elYear.textContent = String(year).padStart(4, '0');
        elEra.textContent  = eraLabel(year);
        applyYearStyle(year);
        pulseYear();
        allLabels = [];
        renderTopicChips(); // reset to neutral while loading
        if (viewingYear === null) { // only update display if in live mode
          fetchEvent(year);
        }
        updateNavStatus();

        const bestEra = pickBestEra(year);
        const eraBadgeEl = document.getElementById('eraBadge');
        if (eraBadgeEl && bestEra) {
          eraBadgeEl.textContent = bestEra.name;
          incrementEraExposure(bestEra.name);
        }
      }

      // At second :50, silently prefetch the NEXT minute's year so the
      // transition at :00 is instant rather than showing a loading spinner.
      if (ss === 50 && viewingYear === null) {
        const nextTotalMins = hh * 60 + mm + 1;
        const nextHH = Math.floor(nextTotalMins / 60) % 24;
        const nextMM = nextTotalMins % 60;
        const nextYear = getYearFromTime(nextHH, nextMM);
        if (!eventBuffer.has(nextYear)) {
          eventBuffer.setFetching(nextYear);
          fetchEventData(nextYear)
            .then(result => { if (result) eventBuffer.set(nextYear, result); else eventBuffer._store.delete(nextYear); })
            .catch(() => eventBuffer._store.delete(nextYear));
        }
      }
    }

    function classifyTopics(labels) {
      const matched = new Set(['All']); // All is always available
      const lowerLabels = labels.map(l => l.toLowerCase());
      for (const [topic, keywords] of Object.entries(TOPIC_KEYWORDS)) {
        const hasMatch = lowerLabels.some(label =>
          keywords.some(kw => label.includes(kw))
        );
        if (hasMatch) matched.add(topic);
      }
      for (const ct of loadCustomTopics()) {
        if (lowerLabels.some(l => ct.keywords.some(kw => l.includes(kw)))) matched.add(ct.label);
      }
      return matched;
    }

    function renderTopicChips(availableTopics = null) {
      const row = document.getElementById('topicRow');
      row.innerHTML = '';
      TOPICS.forEach(({ emoji, label }) => {
        const chip = document.createElement('button');
        chip.className = 'topic-chip' + (label === activeTopic ? ' active' : '');
        if (availableTopics) {
          chip.classList.add(availableTopics.has(label) ? 'has-match' : 'no-match');
        }
        chip.textContent = `${emoji} ${label}`;
        chip.addEventListener('click', () => {
          if (activeTopic === label) return;
          activeTopic = label;
          localStorage.setItem('clockapp-topic', label);
          eventBuffer._store.clear(); // topic change invalidates buffer
          renderTopicChips(availableTopics);
          if (lastYear !== null) fetchEvent(viewingYear !== null ? viewingYear : lastYear);
        });
        row.appendChild(chip);
      });

      const customTopics = loadCustomTopics();
      for (const ct of customTopics) {
        const chip = document.createElement('button');
        chip.className = 'topic-chip' + (activeTopic === ct.label ? ' active' : '');
        if (availableTopics) {
          chip.classList.add(availableTopics.has(ct.label) ? 'has-match' : 'no-match');
        }
        chip.innerHTML = `🏷️ ${sanitise(ct.label)} <span class="chip-remove" data-name="${sanitise(ct.label)}">✕</span>`;
        chip.addEventListener('click', (e) => {
          if (e.target.classList.contains('chip-remove')) {
            const remaining = loadCustomTopics().filter(t => t.label !== ct.label);
            saveCustomTopics(remaining);
            if (activeTopic === ct.label) {
              activeTopic = 'All';
              localStorage.setItem('clockapp-topic', 'All');
            }
            renderTopicChips(availableTopics);
            if (lastYear !== null) fetchEvent(viewingYear !== null ? viewingYear : lastYear);
            return;
          }
          activeTopic = ct.label;
          localStorage.setItem('clockapp-topic', ct.label);
          eventBuffer._store.clear();
          renderTopicChips(availableTopics);
          if (lastYear !== null) fetchEvent(viewingYear !== null ? viewingYear : lastYear);
        });
        row.appendChild(chip);
      }

      const addChip = document.createElement('button');
      addChip.className = 'topic-chip add-custom-chip';
      addChip.id = 'addCustomChip';
      addChip.textContent = '+ Custom';
      addChip.addEventListener('click', () => {
        document.getElementById('customTopicName').value = '';
        document.getElementById('customTopicKeywords').value = '';
        document.getElementById('customTopicModal').hidden = false;
      });
      row.appendChild(addChip);
    }

    // ── Reactions ─────────────────────────────────────────────────────────────
    function loadReactions() {
      try { return JSON.parse(localStorage.getItem('clockapp-reactions') || '{}'); }
      catch { return {}; }
    }
    function storeReactions(r) {
      localStorage.setItem('clockapp-reactions', JSON.stringify(r));
    }
    function getReactionKey(year, text) {
      return `${year}::${text}`;
    }
    function recordReaction(year, text, source, reaction) {
      const r = loadReactions();
      const key = getReactionKey(year, text);
      r[key] = { year, text, source, reaction, timestamp: new Date().toISOString() };
      storeReactions(r);
      updateReactionButtons(year, text);
    }
    function getReaction(year, text) {
      const r = loadReactions();
      const entry = r[getReactionKey(year, text)];
      return entry ? entry.reaction : null;
    }
    function isDisliked(year, text) {
      return getReaction(year, text) === 'dislike';
    }
    function updateReactionButtons(year, text) {
      const reaction = getReaction(year, text);
      document.getElementById('likeBtn').classList.toggle('reacted', reaction === 'like');
      document.getElementById('dislikeBtn').classList.toggle('reacted', reaction === 'dislike');
    }
    // ─────────────────────────────────────────────────────────────────────────

    // ── Saved facts ──────────────────────────────────────────────────────────
    function loadSaved() {
      try { return JSON.parse(localStorage.getItem('clockapp-saved') || '[]'); }
      catch { return []; }
    }
    function storeSaved(saved) {
      localStorage.setItem('clockapp-saved', JSON.stringify(saved));
    }
    function saveCurrentFact(year, text, source) {
      if (!text) return;
      const saved = loadSaved();
      const key = `${year}::${text}`;
      if (saved.find(s => s.key === key)) return;
      saved.unshift({ key, year, text, source, savedAt: new Date().toISOString() });
      storeSaved(saved);
      updateSavedCount();
      flashSaveBtn();
    }
    function removeSaved(key) {
      const saved = loadSaved().filter(s => s.key !== key);
      storeSaved(saved);
      updateSavedCount();
    }
    function updateSavedCount() {
      document.getElementById('savedCount').textContent = loadSaved().length;
    }
    function flashSaveBtn() {
      const btn = document.getElementById('saveBtn');
      btn.classList.add('active');
      btn.textContent = '★ Saved!';
      setTimeout(() => { btn.classList.remove('active'); btn.textContent = '★ Save'; }, 1500);
    }

    function renderSavedPanel() {
      const list = document.getElementById('savedList');
      const saved = loadSaved();
      if (saved.length === 0) {
        list.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">No saved facts yet. Hit ★ Save on any event card!</p>';
        return;
      }
      list.innerHTML = saved.map(s => {
        const reaction = getReaction(s.year, s.text);
        const reactionBadge = reaction === 'like' ? ' 👍' : reaction === 'dislike' ? ' 👎' : '';
        return `
        <div class="saved-item" data-key="${s.key.replace(/"/g, '&quot;')}">
          <button class="saved-item-remove" title="Remove">✕</button>
          <div class="saved-item-year">Year ${sanitise(s.year)}${s.source ? ' / ' + sanitise(s.source) : ''}${reactionBadge}</div>
          <div class="saved-item-text">${sanitise(s.text)}</div>
        </div>
      `;
      }).join('');
      list.querySelectorAll('.saved-item-remove').forEach(btn => {
        btn.addEventListener('click', () => {
          const key = btn.closest('.saved-item').dataset.key;
          removeSaved(key);
          renderSavedPanel();
        });
      });
    }

    document.getElementById('saveBtn').addEventListener('click', () => {
      saveCurrentFact(lastYear, currentEventText, currentSource);
    });
    document.getElementById('likeBtn').addEventListener('click', () => {
      if (currentEventText) recordReaction(lastYear, currentEventText, currentSource, 'like');
    });
    document.getElementById('dislikeBtn').addEventListener('click', () => {
      if (currentEventText) {
        recordReaction(lastYear, currentEventText, currentSource, 'dislike');
        const displayYear = viewingYear !== null ? viewingYear : lastYear;
        eventBuffer._store.delete(displayYear);
        fetchEvent(displayYear);
      }
    });
    document.getElementById('savedListBtn').addEventListener('click', () => {
      renderSavedPanel();
      document.getElementById('savedPanel').hidden = false;
    });
    document.getElementById('closeSavedPanel').addEventListener('click', () => {
      document.getElementById('savedPanel').hidden = true;
    });

    // ── Era stats panel ───────────────────────────────────────────────────────
    function renderEraStats() {
      const exp = loadEraExposure();
      const list = document.getElementById('eraStatsList');
      const scored = EPOCHS.map(era => ({
        name: era.name,
        weight: era.weight,
        count: exp[era.name] || 0,
        score: (exp[era.name] || 0) / era.weight,
      }));
      scored.sort((a, b) => a.score - b.score);
      const top10 = scored.slice(0, 10);
      if (top10.every(e => e.count === 0)) {
        list.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">No era exposure data yet — watch the clock to build your stats!</p>';
        return;
      }
      list.innerHTML = top10.map(e => `
        <div class="saved-item">
          <div class="saved-item-year">${sanitise(e.name)}</div>
          <div class="saved-item-text" style="font-size:0.8rem;color:var(--text-muted)">
            Shown: ${sanitise(e.count)} &bull; Weight: ${sanitise(e.weight)} &bull; Score: ${sanitise(e.score.toFixed(2))}
          </div>
        </div>
      `).join('');
    }
    document.getElementById('eraStatsLink').addEventListener('click', (e) => {
      e.preventDefault();
      renderEraStats();
      document.getElementById('eraStatsPanel').hidden = false;
    });
    document.getElementById('closeEraStats').addEventListener('click', () => {
      document.getElementById('eraStatsPanel').hidden = true;
    });
    // ─────────────────────────────────────────────────────────────────────────

    // ── Custom topic modal ────────────────────────────────────────────────────
    document.getElementById('cancelCustomTopic').addEventListener('click', () => {
      document.getElementById('customTopicModal').hidden = true;
    });

    document.getElementById('saveCustomTopic').addEventListener('click', () => {
      const name = document.getElementById('customTopicName').value.trim();
      const kwText = document.getElementById('customTopicKeywords').value.trim();
      if (!name || !kwText) return;
      const keywords = kwText.split(',').map(k => k.trim().toLowerCase()).filter(Boolean);
      if (!keywords.length) return;
      const topics = loadCustomTopics();
      const idx = topics.findIndex(t => t.label === name);
      if (idx >= 0) topics[idx] = { label: name, keywords };
      else topics.push({ label: name, keywords });
      saveCustomTopics(topics);
      document.getElementById('customTopicModal').hidden = true;
      activeTopic = name;
      localStorage.setItem('clockapp-topic', name);
      eventBuffer._store.clear();
      renderTopicChips();
      if (lastYear !== null) fetchEvent(viewingYear !== null ? viewingYear : lastYear);
    });
    // ─────────────────────────────────────────────────────────────────────────

    // ── Navigation ────────────────────────────────────────────────────────────
    function getDisplayYear() {
      return viewingYear !== null ? viewingYear : lastYear;
    }

    function setViewingYear(year) {
      viewingYear = year;
      updateNavStatus();
      const displayYear = year !== null ? year : lastYear;
      if (displayYear !== null) fetchEvent(displayYear);
    }

    function navigate(delta) {
      const base = viewingYear !== null ? viewingYear : lastYear;
      const next = Math.max(0, Math.min(2359, base + delta));
      setViewingYear(next);
    }

    function returnToLive() {
      setViewingYear(null);
    }

    function updateNavStatus() {
      const el = document.getElementById('navStatus');
      const liveBtn = document.getElementById('liveBtn');
      if (!el) return;
      if (viewingYear !== null) {
        el.innerHTML = `Viewing ${viewingYear}<span class="browsing-badge">BROWSING</span>`;
        document.getElementById('prevBtn').disabled = viewingYear <= 0;
        document.getElementById('nextBtn').disabled = viewingYear >= 2359;
        if (liveBtn) liveBtn.hidden = false;
      } else {
        el.textContent = 'Live';
        document.getElementById('prevBtn').disabled = !lastYear || lastYear <= 0;
        document.getElementById('nextBtn').disabled = !lastYear || lastYear >= 2359;
        if (liveBtn) liveBtn.hidden = true;
      }
    }

    document.getElementById('prevBtn').addEventListener('click', () => navigate(-1));
    document.getElementById('nextBtn').addEventListener('click', () => navigate(+1));
    document.getElementById('liveBtn').addEventListener('click', () => returnToLive());

    // ── Clickable clock → inline time picker ──────────────────────────────────
    (function () {
      const hhmmEl = document.getElementById('hhmm');
      let pickerOpen = false;

      function openTimePicker() {
        if (pickerOpen) return;
        pickerOpen = true;

        const currentText = hhmmEl.textContent; // "HH:MM"
        const input = document.createElement('input');
        input.type = 'time';
        input.id = 'timeInput';
        input.className = 'time-input-inline';
        input.value = currentText;

        let committed = false;

        const commit = () => {
          if (committed) return;
          committed = true;
          pickerOpen = false;
          hhmmEl.parentNode.replaceChild(hhmmEl, input);
          if (input.value) {
            const [hh, mm] = input.value.split(':').map(Number);
            const year = hh * 100 + mm;
            setViewingYear(year);
          }
        };

        const cancel = () => {
          if (committed) return;
          committed = true;
          pickerOpen = false;
          hhmmEl.parentNode.replaceChild(hhmmEl, input);
        };

        input.addEventListener('change', commit);
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); commit(); }
          if (e.key === 'Escape') { e.preventDefault(); cancel(); }
        });
        input.addEventListener('blur', () => setTimeout(cancel, 150));

        hhmmEl.parentNode.replaceChild(input, hhmmEl);
        input.focus();
      }

      hhmmEl.addEventListener('click', openTimePicker);
    })();

    // ── Keyboard navigation ───────────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowLeft')  { e.preventDefault(); navigate(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); navigate(+1); }
      if (e.key === 'Escape' && viewingYear !== null) returnToLive();
    });

    // ── Timeline slider ───────────────────────────────────────────────────────
    (function () {
      const slider = document.getElementById('timelineSlider');
      let sliderDebounce = null;

      slider.addEventListener('input', () => {
        const totalMins = parseInt(slider.value, 10);
        const hh = Math.floor(totalMins / 60);
        const mm = totalMins % 60;
        const year = hh * 100 + mm;
        viewingYear = year;
        updateNavStatus();
        clearTimeout(sliderDebounce);
        sliderDebounce = setTimeout(() => fetchEvent(year), 300);
      });
    })();
    // ─────────────────────────────────────────────────────────────────────────

    // Kick off immediately, then every second
    renderTopicChips();
    updateSavedCount();
    updateNavStatus();
    tick();
    setInterval(tick, 1000);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
